<!doctype html><html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Static Admin</title>
<link rel="stylesheet" href="assets/css/styles.css">
<script defer src="assets/js/lib/auth.js"></script>
<script defer src="assets/js/lib/github.js"></script>
<script defer src="assets/js/lib/ui.js"></script>

<script defer src="assets/js/pages/projects.js"></script>
</head><body>
  
<div class="topbar">
  <div class="inner">
    <div class="brand"><span class="dot"></span>Static Admin</div>
    <div class="nav"><a href="index.html" class="">Dashboard</a>
<a href="projects.html" class="active">Projects</a>
<a href="blog.html" class="">Blog</a>
<a href="media.html" class="">Media</a>
<a href="settings.html" class="">Settings</a></div>
    <div class="row">
      <span class="badge" id="gh-repo-label">Not connected</span>
      <button class="btn" id="logout-btn">Logout</button>
    </div>
  </div>
</div>
  <div class="container">
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h2>Projects</h2>
        <div class="row">
          <button class="btn ok" id="add-project">Add project</button>
          <button class="btn" id="sync-from-site">Scan existing HTML (local)</button>
        </div>
      </div>
      <table class="table" id="projects-table">
        <thead><tr><th>Title</th><th>Category</th><th>Slug</th><th>Thumb</th><th>URL</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal hidden" id="project-modal">
    <div class="modal-header">
      <h3 id="modal-title">New project</h3>
      <button class="btn" id="close-modal">Close</button>
    </div>
    <div class="grid">
      <div class="col-6">
        <label>Title</label><input id="p-title">
      </div>
      <div class="col-6">
        <label>Category</label><input id="p-category" placeholder="uiux, web, branding">
      </div>
      <div class="col-6">
        <label>Slug</label><input id="p-slug" placeholder="course-mate">
      </div>
      <div class="col-6">
        <label>Thumbnail URL</label><input id="p-thumb" placeholder="/img/thumbs/course-mate.jpg">
      </div>
      <div class="col-12">
        <label>Detail URL (existing HTML)</label><input id="p-url" placeholder="/Coursemate.html">
      </div>
      <div class="col-12">
        <button class="btn primary" id="save-project">Save</button>
      </div>
    </div>
  </div>

</body></html>
