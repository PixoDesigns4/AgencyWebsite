<!doctype html><html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Static Admin</title>
<link rel="stylesheet" href="assets/css/styles.css">
<script defer src="assets/js/lib/auth.js"></script>
<script defer src="assets/js/lib/github.js"></script>
<script defer src="assets/js/lib/ui.js"></script>

<script defer src="assets/js/pages/blog.js"></script>
</head><body>
  
<div class="topbar">
  <div class="inner">
    <div class="brand"><span class="dot"></span>Static Admin</div>
    <div class="nav"><a href="index.html" class="">Dashboard</a>
<a href="projects.html" class="">Projects</a>
<a href="blog.html" class="active">Blog</a>
<a href="media.html" class="">Media</a>
<a href="settings.html" class="">Settings</a></div>
    <div class="row">
      <span class="badge" id="gh-repo-label">Not connected</span>
      <button class="btn" id="logout-btn">Logout</button>
    </div>
  </div>
</div>
  <div class="container">
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h2>Blog</h2>
        <button class="btn ok" id="add-post">Add post</button>
      </div>
      <table class="table" id="blog-table">
        <thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Slug</th><th>Cover</th><th>URL</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal hidden" id="post-modal">
    <div class="modal-header">
      <h3 id="modal-title">New post</h3>
      <button class="btn" id="close-modal">Close</button>
    </div>
    <div class="grid">
      <div class="col-6"><label>Title</label><input id="b-title"></div>
      <div class="col-3"><label>Category</label><input id="b-category"></div>
      <div class="col-3"><label>Date (YYYY-MM-DD)</label><input id="b-date" placeholder="2025-08-15"></div>
      <div class="col-6"><label>Slug</label><input id="b-slug" placeholder="my-post"></div>
      <div class="col-6"><label>Cover URL</label><input id="b-cover" placeholder="/img/blog/my-post.jpg"></div>
      <div class="col-12"><label>URL (existing HTML or external)</label><input id="b-url" placeholder="/blog/my-post.html"></div>
      <div class="col-12"><button class="btn primary" id="save-post">Save</button></div>
    </div>
  </div>
</body></html>
